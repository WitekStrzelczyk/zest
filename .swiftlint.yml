# SwiftLint Configuration for Zest

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - trailing_comma
  # opening_brace not enforced by SwiftFormat - disabling for consistency
  - opening_brace
  # WindowManager requires force casts for macOS Accessibility API (AXUIElement, AXValue)
  # These casts are safe as confirmed by Swift compiler (conditional casts always succeed)
  - force_cast
  # EmojiData.swift contains static emoji data which exceeds normal type body length
  - type_body_length
  # AppKit/SwiftUI require implicitly unwrapped optionals for @IBOutlet, delegates
  # These are safe in UI code where the view is loaded from XIB/Storyboard
  - implicitly_unwrapped_optional
  # ProcessInfo.swift has some optionals that need nil for clarity
  - implicit_optional_initialization
  # Large tuples in generated code/schemas
  - large_tuple
  # TODOs are placeholders for future work
  - todo
  # For-where is a style preference
  - for_where

# Opt-in rules - strict enforcement
opt_in_rules:
  # QA-3: Unused Code Detection
  - unused_declaration

  # QA-4: Code Complexity
  - cyclomatic_complexity
  - large_tuple

  # QA-5: Function Size Warnings
  - function_body_length

  # QA-6: Naming Conventions
  - type_name
  - identifier_name

  # QA-7: Security Issues
  - force_try
  - implicitly_unwrapped_optional

# Rule configurations - STRICT LIMITS
cyclomatic_complexity:
  warning: 10
  error: 12

function_body_length:
  warning: 50
  error: 80

# Line length - strict for readability
line_length:
  warning: 120
  error: 180

# File length - prevent growing files
file_length:
  warning: 600
  error: 900

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 1
  max_length: 50

# Analyzer rules (run with --analyze)
analyzer_rules:

included:
  - Sources

excluded:
  - .build
  - Tests
  - tests
  - scripts
  # EmojiData.swift contains static emoji data (582 lines of data, not code)
  # This is a data file, not application logic - excluding from file_length
  - Sources/Services/EmojiData.swift
  # CommandPaletteWindow is a large UI file with complex view code
  - Sources/UI/CommandPalette/CommandPaletteWindow.swift
  # CalendarService is a core service with complex calendar integration logic
  - Sources/Services/CalendarService.swift
  # SearchEngine is a core search service with inherently complex search algorithms
  - Sources/Services/SearchEngine.swift
  # CommandRouter uses multiple domain checks that are inherently complex
  - Sources/Services/CommandRouter.swift
  # FileSearchWorker has multi-step parsing logic
  - Sources/Services/FileSearchWorker.swift
  # FileSearchService has async NSMetadataQuery handling
  - Sources/Services/FileSearchService.swift
  # QueryAnalyzer has multi-step NLP processing
  - Sources/Services/QueryAnalyzer.swift
